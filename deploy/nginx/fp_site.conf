# nginx для fp_site (реверс-прокси на контейнер app).
#
# Установка:
#   sudo cp deploy/nginx/fp_site.conf /etc/nginx/sites-available/fp_site.conf
#   # замените ваш-домен.ru на реальный домен
#   sudo ln -s /etc/nginx/sites-available/fp_site.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Затем выпустите TLS-сертификат — certbot сам допишет 443-блок и редирект с 80:
#   sudo certbot --nginx -d ваш-домен.ru

server {
    listen 80;
    listen [::]:80;
    server_name ваш-домен.ru;

    # Загрузка картинок блюд/логотипа: лимит чуть выше 5 МБ (лимит в multer).
    client_max_body_size 6m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
